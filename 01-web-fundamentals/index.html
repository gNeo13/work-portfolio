<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Kinabalu Kitchen</title>
    <link rel="stylesheet" href="style.css" />
    <script src="script.js" defer></script>
  </head>
  <body>
    <header>
      <h1>Kinabalu Kitchen</h1>
      <p>Sabah-style fusion food, made to order.</p>
    </header>
    <main>
      <section>
        <h2>Today's Menu</h2>
        <ul>
          <li>Beef Rendang Tacos — RM12</li>
          <li>Sabah Midin Stir-fry — RM8</li>
          <li>Hinava-style Ceviche — RM10</li>
        </ul>
      </section>
      <section>
        <h2>Get in Touch</h2>
        <form>
          <label for="name">Your Name</label>
          <input type="text" id="name" required />

          <label for="email">Your Email</label>
          <input type="email" id="email" required />

          <label for="message">Message</label>
          <textarea id="message" required></textarea>

          <button type="submit">Send</button>
          <p id="form-status"></p>
        </form>
      </section>
    </main>
    <footer>
      <p>&copy; 2026 Kinabalu Kitchen. WhatsApp orders welcome.</p>
    </footer>
  </body>
</html>
